<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SmartOrder Dashboard</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: system-ui, sans-serif; background: #f5f5f5; padding: 20px; }
    h1 { color: #1a73e8; margin-bottom: 5px; }
    .subtitle { color: #666; margin-bottom: 20px; }
    .refresh { background: #1a73e8; color: white; border: none; padding: 8px 20px; border-radius: 8px; cursor: pointer; margin-bottom: 20px; font-size: 14px; }
    .refresh:hover { background: #1557b0; }

    .buyer-card {
      background: white; border-radius: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.1);
      margin-bottom: 24px; overflow: hidden;
    }
    .buyer-header {
      background: #1a73e8; color: white; padding: 12px 16px;
      display: flex; justify-content: space-between; align-items: center;
    }
    .buyer-name { font-size: 16px; font-weight: 700; }
    .buyer-number { font-size: 13px; opacity: 0.9; }
    .buyer-stats { font-size: 13px; opacity: 0.85; }

    .table-wrap { overflow-x: auto; }
    table { width: 100%; border-collapse: collapse; font-size: 13px; }
    th { background: #f1f3f4; color: #333; padding: 8px; text-align: left; font-weight: 600; white-space: nowrap; border-bottom: 2px solid #ddd; }
    td { padding: 8px; border-bottom: 1px solid #eee; vertical-align: top; }
    tr:hover { background: #f8f9ff; }

    .badge { display: inline-block; padding: 2px 8px; border-radius: 12px; font-size: 11px; font-weight: 600; }
    .badge-COMPLETED { background: #e6f4ea; color: #137333; }
    .badge-PACKING { background: #e8f0fe; color: #1967d2; }
    .badge-SUBMITTED { background: #fef7e0; color: #b06000; }
    .badge-READY_FOR_PICKUP { background: #e6f4ea; color: #137333; }
    .badge-PARSING, .badge-REVIEWING { background: #fce8e6; color: #c5221f; }

    .price { font-weight: 600; color: #137333; }
    .empty { color: #999; font-style: italic; }
    .total-row { background: #f8f9fa; font-weight: 700; }
    #loading { text-align: center; padding: 40px; color: #666; }
  </style>
</head>
<body>
  <h1>🛒 SmartOrder Dashboard</h1>
  <p class="subtitle">Buyer-wise orders — ek buyer, ek table</p>
  <button class="refresh" onclick="load()">🔄 Refresh</button>
  <div id="container"></div>

  <script>
    function badge(status) {
      const cls = `badge-${status}`;
      return `<span class="badge ${cls}">${status.replace(/_/g, ' ')}</span>`;
    }

    function buildTable(orders) {
      return `
        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th>Date</th>
                <th>Status</th>
                <th>Seller</th>
                <th>Store</th>
                <th>Items</th>
                <th>Total</th>
                <th>Last Message</th>
                <th>Msgs</th>
              </tr>
            </thead>
            <tbody>
              ${orders.map(r => `
                <tr>
                  <td>${new Date(r.order_date).toLocaleString('en-IN', {day:'2-digit',month:'short',hour:'2-digit',minute:'2-digit'})}</td>
                  <td>${badge(r.order_status)}</td>
                  <td>${r.seller_name || '<span class="empty">—</span>'}<br><small style="color:#888">${r.seller_number}</small></td>
                  <td>${r.store_name || '<span class="empty">—</span>'}</td>
                  <td style="max-width:300px">${r.items || '<span class="empty">no items</span>'}</td>
                  <td>${r.order_total ? '<span class="price">₹'+r.order_total+'</span>' : '<span class="empty">—</span>'}</td>
                  <td style="max-width:180px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">${r.last_message || '<span class="empty">—</span>'}</td>
                  <td style="text-align:center">${r.message_count}</td>
                </tr>
              `).join('')}
            </tbody>
          </table>
        </div>`;
    }

    function sellerCard(s) {
      return `
        <div class="buyer-card">
          <div class="buyer-header" style="background:#137333">
            <div>
              <div class="buyer-name">🏪 ${s.store_name || s.name || 'Unknown'}</div>
              <div class="buyer-number">📱 ${s.phone_number}  |  👤 ${s.name || '—'}</div>
            </div>
            <div class="buyer-stats">
              📋 ${s.total_orders} orders &nbsp;|&nbsp;
              ✅ ${s.completed_orders} done &nbsp;|&nbsp;
              💰 ₹${s.total_revenue} revenue
            </div>
          </div>
        </div>`;
    }

    async function load() {
      const container = document.getElementById('container');
      container.innerHTML = '<div id="loading">Loading...</div>';
      try {
        const [orderRes, sellerRes] = await Promise.all([
          fetch('/api/orders/summary'),
          fetch('/api/sellers/summary')
        ]);
        const orders = await orderRes.json();
        const sellers = await sellerRes.json();

        let html = '';

        // ── Sellers Section ────────────────────────
        if (sellers.length) {
          html += '<h2 style="margin-bottom:12px;color:#137333;">👥 Sellers</h2>';
          html += sellers.map(s => sellerCard(s)).join('');
          html += '<hr style="margin:24px 0;border:1px solid #ddd;">';
        }

        // ── Buyers Section ────────────────────────
        if (orders.length) {
          html += '<h2 style="margin-bottom:12px;">👤 Buyers</h2>';
          const groups = {};
          for (const row of orders) {
            const key = row.buyer_number;
            if (!groups[key]) groups[key] = { name: row.buyer_name, number: row.buyer_number, orders: [] };
            groups[key].orders.push(row);
          }
          html += Object.values(groups).map(g => {
            const total = g.orders.reduce((s, o) => s + (o.order_total || 0), 0);
            const completed = g.orders.filter(o => o.order_status === 'COMPLETED').length;
            return `
              <div class="buyer-card">
                <div class="buyer-header">
                  <div>
                    <div class="buyer-name">👤 ${g.name || 'Unknown'}</div>
                    <div class="buyer-number">📱 ${g.number}</div>
                  </div>
                  <div class="buyer-stats">
                    📋 ${g.orders.length} orders &nbsp;|&nbsp;
                    ✅ ${completed} done &nbsp;|&nbsp;
                    💰 ₹${total} total
                  </div>
                </div>
                ${buildTable(g.orders)}
              </div>`;
          }).join('');
        }

        container.innerHTML = html || '<div style="text-align:center;padding:60px;color:#999;background:white;border-radius:12px;">No data yet</div>';
      } catch(e) {
        container.innerHTML = '<div style="text-align:center;padding:40px;color:red;">Error loading data</div>';
        console.error(e);
      }
    }
    load();
  </script>
</body>
</html>
